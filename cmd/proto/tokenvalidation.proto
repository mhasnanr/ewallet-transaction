// protoc --go_out=. --go-grpc_out=. cmd/proto/tokenvalidation.proto

syntax = "proto3";

package tokenvalidation;

option go_package = "cmd/tokenvalidation";

service TokenValidation {
    rpc ValidateToken(TokenRequest) returns (TokenResponse);
}

message TokenRequest {
    string token = 1;
}

message TokenResponse {
    string message = 1;
    UserData data = 2;
}

message UserData {
    int64 user_id = 1;
    string username = 2;
    string full_name = 3;
    string email = 4;
}