// protoc --go_out=. --go-grpc_out=. cmd/proto/transaction.proto

syntax = "proto3";

package transaction;

option go_package = "cmd/transaction";

service Transaction {
    rpc CreateTransaction(TransactionRequest) returns (TransactionResponse);
}

message TransactionRequest {
    int64 userID = 1;
    int64 amount = 2;
    string type = 3;
    string description = 4;
}

message TransactionResponse {
    string message = 1;
    TransactionData data = 2;
}

message TransactionData {
    string status = 1;
    string reference = 2;
    string type = 3;
}

